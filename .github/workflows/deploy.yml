name: Deploy (Cloudflare)

# main 에 머지/푸시되면 자동 배포. 데이터는 git 에 베이크돼 있어(gen:data 안 함)
# 빌드가 라이브 API 를 안 쳐서 CI 에서 빠르게 끝난다.
# 데이터 새로고침은 로컬에서 `pnpm gen:data` 후 server/assets 커밋.
on:
  push:
    branches: [main]
    paths-ignore:
      - ".github/**"
      - "**.md"
  workflow_dispatch: {} # 수동 배포 버튼

concurrency:
  group: deploy-main
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: 의존성 설치
        run: pnpm install --frozen-lockfile

      - name: 빌드 (베이크된 데이터 사용, gen:data 안 함)
        run: pnpm build:baked

      - name: 배포 + 캐시 퍼지
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CF_ZONE_ID: ${{ secrets.CF_ZONE_ID }}
        run: |
          bunx wrangler deploy
          node scripts/purge-kv.mjs

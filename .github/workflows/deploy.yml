name: Deploy (Cloudflare)

# ⚠️ 자동 push 트리거 비활성화됨.
# 이유: 빌드 프리렌더가 열린국회정보 API(open.assembly.go.kr)를 호출하는데
#       GitHub 러너 IP에서 502/타임아웃이 나서 빌드가 20분+ 무한정 걸림(로컬은 6초).
#       → CI 자동배포 불가. 현재는 수동 버튼만 유지. 로컬 `npm run deploy` 사용 권장.
# 해결하려면: (a) self-hosted 러너(내 IP) (b) 베이크된 데이터 커밋 + 프리렌더에서 라이브 API 제거.
on:
  workflow_dispatch: {} # 수동 배포 버튼(Actions 탭). 현재 CI에선 API 차단으로 실패할 수 있음.

# 동시에 한 번만 배포(이전 배포 진행 중이면 취소하고 최신으로)
concurrency:
  group: deploy-main
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: 의존성 설치
        run: npm install

      - name: 데이터 생성 + 빌드
        env:
          API_KEY: ${{ secrets.API_KEY }} # 열린국회정보 Open API 키 (gen:data)
          KAKAO_MAP_KEY: ${{ secrets.KAKAO_MAP_KEY }}
          KAKAO_REST_KEY: ${{ secrets.KAKAO_REST_KEY }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ZONE_ID: ${{ secrets.CF_ZONE_ID }}
        run: npm run build # = gen:data + nuxt build

      - name: 배포 + 캐시 퍼지
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CF_ZONE_ID: ${{ secrets.CF_ZONE_ID }}
        run: |
          bunx wrangler deploy
          node scripts/purge-kv.mjs

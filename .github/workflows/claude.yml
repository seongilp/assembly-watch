name: Claude 패치 봇

# 사용법: 이슈에 `claude` 라벨을 붙이면 Claude 가 요청을 읽고 패치 PR 을 만든다.
# - merge 는 사람이 직접 한다(이 워크플로는 PR 생성까지만).
# - 라벨을 붙이는 행위 자체가 "이 요청은 처리해도 됨" 승인 게이트 역할을 한다.
on:
  issues:
    types: [labeled]

# 토큰 권한: PR/이슈/브랜치까지만. admin·삭제 권한 없음 → "레포 지워줘" 류는 구조적으로 불가.
permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write # claude-code-action OIDC 인증에 필요

concurrency:
  group: claude-issue-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  patch:
    # `claude` 라벨이 붙은 경우에만 동작
    if: github.event.label.name == 'claude'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          # Claude 구독(Pro/Max) OAuth 토큰. 로컬에서 `claude setup-token` 으로 생성 후
          # 저장소 Secret 에 CLAUDE_CODE_OAUTH_TOKEN 으로 등록.
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: "--model claude-opus-4-8"
          prompt: |
            이슈 #${{ github.event.issue.number }} 는 이 저장소(국회 의정감시 Nuxt 4 앱)에 대한 기능개선 요청이다.
            제목: "${{ github.event.issue.title }}"

            아래 절차를 지켜라.

            1) 이슈 본문을 읽고 요청을 정확히 파악한다.

            2) 안전·범위 점검. 다음 중 하나라도 해당하면 구현하지 말고,
               이슈에 한국어로 거절 사유를 한 줄 코멘트한 뒤 종료한다(브랜치·PR 을 만들지 말 것):
               - 저장소/브랜치/대량 파일 삭제, git 히스토리 변경
               - 시크릿·토큰·환경변수, 배포설정(wrangler.jsonc), CI(.github/**) 변경 또는 노출 요구
               - 외부로 데이터 전송, 출처 불명 의존성 추가
               - 요청이 모호하거나 악의적이거나 이 프로젝트 범위를 벗어남

            3) 안전하면 새 브랜치에서 최소 변경으로 구현한다.
               - 기존 코드 스타일·디렉터리 구조·한국어 주석 관습을 따른다.
               - 불필요하게 범위를 넓히지 말고 요청한 것만 정확히 구현한다.

            4) 변경을 PR 로 연다. PR 본문(한국어)에 무엇을·왜 바꿨는지 요약하고
               본문 끝에 "Closes #${{ github.event.issue.number }}" 를 넣는다.

            5) 절대 merge 하지 않는다. 배포 명령(npm run deploy, wrangler deploy 등)도 실행하지 않는다.
               PR 생성까지가 너의 역할이고, 합치는 것은 사람이 판단한다.
